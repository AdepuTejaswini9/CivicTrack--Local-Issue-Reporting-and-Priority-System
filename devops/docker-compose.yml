# devops/docker-compose.yml
# ============================================================
# Runs the app with Docker Compose.
# Usage:  docker-compose -f devops/docker-compose.yml up --build
# ============================================================

version: '3.9'

services:
  web:
    build:
      context: ..          # Build from the project root
      dockerfile: devops/Dockerfile
    container_name: civictrack_app
    ports:
      - "5000:5000"         # Map host port 5000 → container port 5000
    volumes:
      # Persist the SQLite database and uploaded images across restarts
      - civictrack_db:/app/backend/database
      - civictrack_uploads:/app/backend/uploads
    environment:
      - FLASK_DEBUG=false
      - SECRET_KEY=super-secret-change-me-in-prod
    restart: unless-stopped

volumes:
  civictrack_db:
  civictrack_uploads:
