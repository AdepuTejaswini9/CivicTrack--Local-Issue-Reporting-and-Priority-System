# devops/github-actions.yml
# ============================================================
# GitHub Actions CI/CD Pipeline
#
# Save this file at:  .github/workflows/ci.yml
# (copy it from devops/ to .github/workflows/ in your repo)
#
# What it does:
#   1. Lint Python code with flake8
#   2. Run unit tests with pytest
#   3. Build Docker image to verify it works
# ============================================================

name: CI/CD Pipeline

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main ]

jobs:

  # ── Job 1: Lint & Test ──────────────────────────────────
  test:
    name: Lint & Test
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Cache pip dependencies
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-${{ hashFiles('requirements.txt') }}

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install flake8 pytest

      - name: Lint with flake8
        run: |
          # Stop on syntax errors or undefined names (critical)
          flake8 backend/ run.py --count --select=E9,F63,F7,F82 --show-source --statistics
          # Warn on style issues (non-blocking)
          flake8 backend/ run.py --count --exit-zero --max-line-length=100 --statistics

      - name: Run tests
        env:
          SECRET_KEY: test-secret-key-for-ci
          DATABASE_URL: ":memory:"
        run: |
          # Run pytest if tests/ folder exists; skip gracefully if not
          if [ -d "tests" ]; then pytest tests/ -v; else echo "No tests folder yet — skipping"; fi

  # ── Job 2: Build Docker Image ──────────────────────────
  docker-build:
    name: Build Docker Image
    runs-on: ubuntu-latest
    needs: test          # Only build if tests pass

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Build Docker image
        run: |
          docker build -f devops/Dockerfile -t civictrack:${{ github.sha }} .
          echo "✅ Docker image built successfully"

      # ── Optional: Push to Docker Hub ──
      # Uncomment and add DOCKERHUB_USERNAME / DOCKERHUB_TOKEN to repo secrets
