{% extends "layout.html" %}
{% block title %}Register{% endblock %}

{% block content %}
<div class="auth-wrapper">
  <div class="auth-card">
    <div class="auth-logo">
      <div class="logo-icon">✍️</div>
      <h1>Create account</h1>
      <p>Join the community and report local issues</p>
    </div>

    <form method="POST" action="{{ url_for('auth.register') }}">
      <div class="form-group">
        <label class="form-label" for="username">Username</label>
        <input class="form-control" type="text" id="username" name="username"
               placeholder="Choose a username" required autofocus
               minlength="3" maxlength="30" />
      </div>

      <div class="form-group">
        <label class="form-label" for="email">Email (optional)</label>
        <input class="form-control" type="email" id="email" name="email"
               placeholder="your@email.com" />
      </div>

      <div class="form-group">
        <label class="form-label" for="password">Password</label>
        <input class="form-control" type="password" id="password" name="password"
               placeholder="Min. 6 characters" required minlength="6" />
      </div>

      <div class="form-group">
        <label class="form-label" for="confirm_password">Confirm Password</label>
        <input class="form-control" type="password" id="confirm_password"
               name="confirm_password" placeholder="Repeat password" required />
      </div>

      <button class="btn btn-primary btn-full" type="submit" style="margin-top:8px">
        Create Account →
      </button>
    </form>

    <div class="auth-link">
      Already have an account?
      <a href="{{ url_for('auth.login') }}">Log in</a>
    </div>
  </div>
</div>
{% endblock %}
